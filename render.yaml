services:
  - type: web
    name: speakai
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TEXT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime
      - key: OPENAI_REALTIME_VOICE
        value: marin
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: APP_URL
        sync: false
      - key: ADMIN_EMAIL
        value: admin@speakai.local
      - key: ADMIN_PASSWORD
        sync: false
